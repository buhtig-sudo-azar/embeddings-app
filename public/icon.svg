<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <!-- Скруглённый фон в изумрудном градиенте -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Символ →V← — отсылка к векторам эмбеддингов -->
  <text x="32" y="42" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="url(#fg)">→V←</text>
  <!-- Маленькая точка-акцент -->
  <circle cx="48" cy="16" r="3" fill="#fbbf24" opacity="0.9"/>
  <!-- Тонкая обводка -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="none" stroke="#065f46" stroke-width="0.5" opacity="0.5"/>
</svg>
